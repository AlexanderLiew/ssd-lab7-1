name: Node.js Selenium Testing

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Prepare artifacts
        run: |
          tar -czf www-build.tar.gz package.json package-lock.json src tests

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: www-build
          path: www-build.tar.gz

  test:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: node:22-bookworm
      ports:
        - 3000:3000
      options: --network-alias=testserver

    env:
      TEST_BASE_URL: http://testserver:3000
      SELENIUM_HOST: http://selenium:4444/wd/hub

    services:
      selenium:
        image: selenium/standalone-chrome
        ports:
          - 4444:4444

    steps:
      - name: Download built files
        uses: actions/download-artifact@v4
        with:
          name: www-build

      - name: Extract artifacts
        run: tar -xzf www-build.tar.gz

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Run Selenium integration test
        run: |
          node src/server.js > server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT

          for i in $(seq 1 20); do
            curl -fsS http://localhost:3000/timestamp && break
            if [ "$i" -eq 20 ]; then
              cat server.log
              exit 1
            fi
            sleep 1
          done

          for i in $(seq 1 20); do
            curl -fsS "$SELENIUM_HOST/status" && break
            if [ "$i" -eq 20 ]; then exit 1; fi
            sleep 2
          done

          node tests/SeleniumTest.mjs github
